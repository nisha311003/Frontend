<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 250px;
            height: 250px;
            border: 1px solid grey;
            border-radius: 12px;
            text-align: center;
            padding: 20px;

            margin: 150px auto;
            font-size: 17px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-color: #eee;
            
        }
        p{
            padding-top: 10px;
        }
        button{
            border: none;
            background-color: rgb(2, 101, 2);
            color: white;
            height: 30px;
            width: 80px;
            border-radius: 12px;
            padding: 5px 14px;
        }
        
    </style>
</head>
<body>
    <div>

        <p><u>Name: <b>Nisha</b></u></p>
        <p>Role: <b>Full Stack Developer</b></p>
        <p>Company: <b>Capgemini</b></p>
        <p>Location: <b>Bihar</b></p>
        <button>Follow</button>
    </div>
</body>
</html>
