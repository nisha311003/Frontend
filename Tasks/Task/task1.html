<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 250px;
            height: 330px;
            border: 2px solid rgb(173, 59, 59);
            border-radius: 12px;
            text-align: center;
            padding: 30px;
            margin: 100px auto;
            background-color: #dedfda;
            box-shadow: 3px 3px rgba(123, 2, 2, 0.5);
        
        }
        img{
            margin-top: 15px;
            border: 1px solid rgb(166, 37, 37);
            border-radius: 10px;
            box-shadow: 1px 1px rgba(123, 2, 2, 0.5);
            
        
        }
        h2{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            margin-top: 4px;
        }
        p{
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        
            margin-top: 4px;
            font-weight: 600;
        }
        button{
            border: none;
            height: 30px;
            width: 100px;
            border-radius: 10px;
            background-color: green;
            color:white;
            padding: 5px 14px ;
            margin-top: 7px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="./headphone.png" alt="headphones" width="150px" height="135px">
        <h2>Headphones</h2>
        <p id="electronics"><b>Electronics</b></p>
        <p><b>Price: <strike>$4500</strike> $3500</b></p>
        <button>Add to cart</button>
    </div>
</body>
</html>
