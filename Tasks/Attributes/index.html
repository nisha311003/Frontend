<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #first{
            color: red;
        }
        #second{
            color: brown;
        }
        .classes{
            color: blue;
        }
    </style>
</head>
<body>
    <h2 id="first">This is first heading</h2>
    <h2 id="second">This is second heading</h2>
    <h2 class="classes">This is h2 heading</h2>
    <p class="classes">This is a paragraph</p>

    <p title="This is a paragraph">Hover on this paragraph</p>
</body>
</html>
