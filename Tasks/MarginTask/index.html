<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        #margin {
            width: 520px;
            height: 270px;
            border: 2px dashed black;
            padding: 20px;
            background-color: rgb(180, 97, 7);
            margin: 10px;
        }

        #border {
            width: 450px;
            height: 200px;
            border: 2px solid black;
            padding: 20px;
            background-color: rgb(230, 155, 17);
            margin: 10px;
        }

        #padding {
            width: 380px;
            height: 130px;
            border: 2px dashed black;
            padding: 20px;
            background-color: rgb(105, 229, 51);
            margin: 10px;
        }

        #content {
            width: 310px;
            height: 60px;
            border: 2px solid black;
            padding: 20px;
            background-color: rgb(91, 91, 235);
            text-align: center;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div id="margin">
        <div id="border">
            <div id="padding">
                <div id="content">
                    content
                </div>
            </div>
        </div>
        
    </div>
</body>
</html>
