<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <ul>
                <div class="step1">
                    <div class="shape">1</div>
                    <div class="l"><p>STEP 1 </p><br><b>YOUR INFO</b></div>
                </div>
                <div class="step2">
                    <div class="shape">2</div>
                    <div class="l"><p>STEP 2 </p><br><b>SELECT PLAN</b></div>
                </div>
                <div class="step3">
                    <div class="shape">3</div>
                    <div class="l"><p>STEP 3 </p><br><b>ADD-ONS</b></div>
                </div>
                <div class="step4">
                    <div class="shape">4</div>
                    <div class="l"><p>STEP 4 </p><br><b>SUMMARY</b></div>
                </div>
            </ul>
        </div>
        <div class="info">
            <h2>Personal Info</h2>
            <p>Please provide your name, email address, and phone number.</p>
            <form action="">
                <label for="name">Name</label><br>
                <input type="text" id="name" placeholder="e.g. Stephen King">
                <br>
                <label for="email">Email Address</label><br>
                <input type="email" id="email" placeholder="e.g. stephenKing@lorem.com"><br>
                <label for="phone">Phone Number</label><br>
                <input type="tel" id="phone" placeholder="e.g. !1 234 567 890"><br>

                <button type="submit">Next Step</button>
            </form>
        </div>
    </div>
    
</body>
</html>
