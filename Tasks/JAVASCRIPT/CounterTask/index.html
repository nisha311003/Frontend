<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        div{
            height: 100px;
            width: 200px;
            border: 2px solid grey;
            background-color: #eee;
            margin: 50px auto;
            text-align: center;
            padding: 20px;
            font-size: 20px;
        
        }
        #inc{
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 4px 16px;
            font-size: 15px;
            margin-right: 8px;
        }
        #dec{
            background-color: rgb(49, 6, 188);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 4px 16px;
            font-size: 15px;
            margin-right: 8px;
        }
        #res{
            background-color: rgb(76, 2, 2);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 15px;
        }
    </style>
</head>
<body>
    <div>
        <p>Counter: <span id="value">0</span></p>
        <button id="inc">+</button>
        <button id="dec">-</button>
        <button id="res"><i class="fa-solid fa-arrow-rotate-left"></i></button>
    </div>

    <script src="./script.js"></script>
</body>
</html>
